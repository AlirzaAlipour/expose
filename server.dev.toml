bind_address = "127.0.0.1:6200"
domain = "dev.localhost"
public_port = 6200
rate_limit_requests_per_minute = 120
rate_limit_burst_size = 20
api_keys = ["local-dev-key-local-dev-key"]
request_body_limit_bytes = 1048576
request_timeout_secs = 15

tls_enabled = false

[streaming]
enabled = true
threshold_bytes = 1048576
chunk_size_bytes = 65536
max_body_bytes = 104857600

[metrics]
enabled = true
bind_address = "127.0.0.1:9900"

[tcp_forward]
bind_host = "0.0.0.0"

[pending_requests]
max_per_tunnel = 100
max_global = 1000
sweep_interval_ms = 500
default_timeout_secs = 15

[limits]
max_tunnels = 32
max_tunnels_per_key = 0
max_pending_requests = 1000

[admin]
token = "test-admin-token-1234567890"
insecure_admin = false
rate_limit_per_minute = 60

[tcp_tuning]
nodelay = true
keepalive_enabled = false
send_buffer_size = 131072
recv_buffer_size = 131072
